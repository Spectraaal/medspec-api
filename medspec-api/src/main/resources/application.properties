spring.application.name=medspec-api
#driver de mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#ubicacion de la BD
spring.datasource.url=jdbc:mysql://localhost:3307/medspecdb
#definir user y pass
spring.datasource.username=root
spring.datasource.password=
#actualiza o limpia las BD
spring.jpa.hibernate.ddl-auto=update
#muestra los errores y peticiones a sql
spring.jpa.show-sql=true
